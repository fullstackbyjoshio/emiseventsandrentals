<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Emis Events and Rentals</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background: #faf8f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Canopy tent effect at top */
    .canopy {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 180px;
      background: #4a1a4a;
      clip-path: polygon(0 0, 50% 100%, 100% 0);
      z-index: 1;
    }

    .canopy::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 100%;
      background: #6b2d6b;
      clip-path: polygon(10% 0, 50% 85%, 90% 0);
    }

    .canopy::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 100%;
      background: #8b4a8b;
      clip-path: polygon(25% 0, 50% 70%, 75% 0);
    }

    /* Decorative poles */
    .pole-left, .pole-right {
      position: absolute;
      top: 0;
      width: 8px;
      height: 100%;
      background: #d4af37;
      z-index: 0;
    }

    .pole-left {
      left: 15%;
    }

    .pole-right {
      right: 15%;
    }

    /* String lights effect */
    .lights {
      position: absolute;
      top: 140px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-around;
      padding: 0 20%;
      z-index: 2;
    }

    .light {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ffd700;
      box-shadow: 0 0 20px #ffd700, 0 0 40px #ffd700;
      animation: flicker 2s ease-in-out infinite alternate;
    }

    .light:nth-child(odd) {
      animation-delay: 0.5s;
    }

    .light:nth-child(3n) {
      background: #ffb6c1;
      box-shadow: 0 0 20px #ffb6c1, 0 0 40px #ffb6c1;
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(0.9); }
    }

    /* Main content */
    .content {
      text-align: center;
      z-index: 10;
      padding: 2rem;
      max-width: 500px;
    }

    .logo {
      width: 100px;
      height: 100px;
      background: #4a1a4a;
      border-radius: 50%;
      margin: 0 auto 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 2rem;
      font-weight: bold;
      border: 4px solid #d4af37;
    }

    h1 {
      font-size: 6rem;
      color: #4a1a4a;
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    h2 {
      font-size: 1.5rem;
      color: #6b2d6b;
      margin-bottom: 1rem;
      font-weight: normal;
    }

    p {
      color: #666;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: #4a1a4a;
      color: white;
      text-decoration: none;
      border-radius: 50px;
      font-size: 1rem;
      transition: all 0.3s ease;
      border: 2px solid #4a1a4a;
    }

    .btn:hover {
      background: transparent;
      color: #4a1a4a;
    }

    /* Floor/ground effect */
    .floor {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: #e8e0d5;
      z-index: 0;
    }

    /* Confetti pieces */
    .confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      opacity: 0.6;
      animation: fall 3s linear infinite;
    }

    .confetti:nth-child(1) { left: 10%; background: #ffd700; animation-delay: 0s; }
    .confetti:nth-child(2) { left: 30%; background: #ffb6c1; animation-delay: 0.5s; }
    .confetti:nth-child(3) { left: 50%; background: #87ceeb; animation-delay: 1s; }
    .confetti:nth-child(4) { left: 70%; background: #ffd700; animation-delay: 1.5s; }
    .confetti:nth-child(5) { left: 90%; background: #ffb6c1; animation-delay: 2s; }

    @keyframes fall {
      0% { top: -10px; transform: rotate(0deg); }
      100% { top: 100vh; transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="canopy"></div>
  <div class="pole-left"></div>
  <div class="pole-right"></div>
  <div class="lights">
    <div class="light"></div>
    <div class="light"></div>
    <div class="light"></div>
    <div class="light"></div>
    <div class="light"></div>
    <div class="light"></div>
    <div class="light"></div>
  </div>
  <div class="floor"></div>
  
  <div class="confetti"></div>
  <div class="confetti"></div>
  <div class="confetti"></div>
  <div class="confetti"></div>
  <div class="confetti"></div>

  <div class="content">
    <div class="logo">E</div>
    <h1>404</h1>
    <h2>This Tent is Empty</h2>
    <p>Looks like the event you're looking for hasn't been set up yet. The page may have been moved, or perhaps it was never part of the celebration.</p>
    <a href="/" class="btn">Return to Main Event</a>
  </div>
</body>
</html>
