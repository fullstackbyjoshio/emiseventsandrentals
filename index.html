<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emis Events and Rentals</title>
    
    <!-- Preconnect to Google Fonts (eliminates DNS/TCP delay) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Load fonts with display=swap (non-blocking) -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Preload hero image for faster LCP -->
    <link rel="preload" as="image" href="/hero_archway.webp" type="image/webp">
    
    <!-- Schema Markup for Google -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "EventVenue",
      "name": "Emis Events and Rentals",
      "description": "Luxury event rentals and styling for occasions that matter.",
      "url": "https://emiseventsandrentals.com",
      "telephone": "+234-813-130-3059",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "New Market",
        "addressLocality": "Ilisan Remo",
        "addressRegion": "Ogun State",
        "addressCountry": "NG"
      },
      "openingHours": "Mo-Su 08:00-21:00",
      "priceRange": "$$",
      "areaServed": {
        "@type": "Place",
        "name": "Ogun State, Nigeria"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
